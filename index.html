<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Coffee by Bravo</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon.png">
  <link rel="shortcut icon" href="favicon.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="mobile-container">
    <div class="sticky-header">
      <header class="app-header">
        <a href="#" class="back-btn" id="back-from-search">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M7.82843 10.9999H20V12.9999H7.82843L13.1924 18.3638L11.7782 19.778L4 11.9999L11.7782 4.22168L13.1924 5.63589L7.82843 10.9999Z">
            </path>
          </svg>
        </a>
        <a href="store.html" class="location-picker-link">
          <div class="location-picker">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M15.2929 3.29289C16.0739 2.51184 17.34 2.51184 18.121 3.29289L19.707 4.87868C20.4881 5.65973 20.4881 6.92606 19.707 7.70711L10.4141 17H7V13.5858L15.2929 3.29289ZM16 5.41421L8 13.4142V16H10.5858L18.5858 8.00005L16 5.41421Z">
              </path>
              <path d="M16 5.41421L18.5858 8.00005L17.2929 9.29294L14.7071 6.70716L16 5.41421Z"></path>
              <path d="M5 20H19V21C19 21.5523 18.5523 22 18 22H6C5.44772 22 5 21.5523 5 21V20Z"></path>
            </svg>
            <div>
              <span class="pickup-label">Pick up di store</span>
              <span class="location-name">Pilih store</span>
            </div>
          </div>
        </a>

        <input type="search" id="product-search-input" class="search-input-main" placeholder="">

        <div class="header-icons">
          <button class="icon-button" id="search-icon-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="icon">
              <path
                d="M18.031 16.6168L22.3137 20.8995L20.8995 22.3137L16.6168 18.031C15.0769 19.263 13.124 20 11 20C6.02944 20 2 15.9706 2 11C2 6.02944 6.02944 2 11 2C15.9706 2 20 6.02944 20 11C20 13.124 19.263 15.0769 18.031 16.6168ZM16.0247 15.8748C17.2475 14.6146 18 12.8956 18 11C18 7.13401 14.866 4 11 4C7.13401 4 4 7.13401 4 11C4 14.866 7.13401 18 11 18C12.8956 18 14.6146 17.2475 15.8748 16.0247L16.0247 15.8748Z">
              </path>
            </svg>
          </button>
        </div>
      </header>

      <div class="filter-wrapper">
        <div class="filters">
        </div>
      </div>
    </div>

    <main id="product-list-container">
      <div id="no-results-message" class="empty-cart-msg" style="display: none; padding: 40px 16px;">
        <h3>Menu Tidak Ditemukan</h3>
        <p>Coba gunakan kata kunci lain untuk menemukan menu favoritmu.</p>
      </div>
    </main>

    <template id="product-card-template">
      <article class="product-card">
        <img src="" alt="" class="product-image" />
        <div class="product-details">
          <h3></h3>
          <p class="product-description"></p>

          <div class="product-price-wrapper">
            <p class="product-price"></p>
            <p class="sold-out-label">Habis Terjual</p>
          </div>
        </div>
        <div class="product-actions">
          <button class="action-btn add-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <path d="M11 11V5H13V11H19V13H13V19H11V13H5V11H11Z"></path>
            </svg>
          </button>
        </div>
      </article>
    </template>

  </div>
  <script src="script.js" defer></script>
</body>

</html>
